name: act_trading
description: "ACT Trading - Algorithmic Crypto Trading Dashboard"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Supabase (Auth + Realtime)
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # WebSocket
  web_socket_channel: ^3.0.2

  # Utilities
  intl: ^0.20.2
  http: ^1.3.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
